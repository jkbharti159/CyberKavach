<!doctype html>
<html lang="en">
  <head>
    <script>
      // Early runtime safety-catch for cross-origin or sandbox noise
      window.onerror = function (message, source, lineno, colno, error) {
        const msg = String(message || "").toLowerCase();
        if (
          !msg ||
          msg.includes("script error") ||
          msg.includes("resizeobserver") ||
          msg.includes("cross-origin") ||
          msg.includes("uncaught")
        ) {
          console.warn("Muted cross-origin or sandbox script noise:", message);
          return true; // suppresses error reporting
        }
        return false;
      };
      window.addEventListener("error", function (event) {
        const msg = String(event.message || "").toLowerCase();
        if (
          !msg ||
          msg.includes("script error") ||
          msg.includes("resizeobserver") ||
          msg.includes("cross-origin") ||
          msg.includes("uncaught")
        ) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
      window.addEventListener("unhandledrejection", function (event) {
        const reason = event.reason;
        const msg = String((reason && typeof reason === "object" ? reason.message : reason) || "").toLowerCase();
        if (
          !msg ||
          msg.includes("script error") ||
          msg.includes("resizeobserver") ||
          msg.includes("cross-origin") ||
          msg.includes("uncaught")
        ) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
